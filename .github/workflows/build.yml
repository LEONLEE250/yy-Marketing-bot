name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.1)'
        required: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend with PyInstaller
        run: |
          pyinstaller --onefile --name backend --distpath backend/dist `
            --add-data "..\wechat-wxauto\*.py;wechat-wxauto" `
            --hidden-import flask --hidden-import flask_cors --hidden-import wxauto `
            --hidden-import PIL --hidden-import requests --hidden-import numpy `
            --hidden-import image_enhancer --hidden-import ai_copywriter --hidden-import wxauto_service `
            --hidden-import PIL.Image --hidden-import PIL.ImageDraw --hidden-import PIL.ImageFont `
            --hidden-import PIL.ImageFilter --hidden-import PIL.ImageEnhance `
            backend/app.py

      - name: Install Node dependencies
        run: npm install

      - name: Build Electron app
        run: npx electron-builder --win --publish never

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.exe
          body: |
            ## v1.0.1 更新内容

            - 修复群发中心收件人加载问题
            - 修复图片工具处理并预览功能
            - AI 模型改为手动输入，支持任意兼容模型
            - 修复 PyInstaller 打包路径问题
            - 清理话术库乱码数据

            ### 使用方式
            1. 下载 `.exe` 安装包
            2. 双击安装
            3. 打开微信电脑版
            4. 启动「壹准 AI 营销助手」
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
