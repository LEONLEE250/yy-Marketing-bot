name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (e.g. v1.1.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }} -f

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Build backend with PyInstaller (spec)
        run: |
          pyinstaller backend/backend.spec --noconfirm

      - name: Install Node dependencies
        run: npm install

      - name: Build Electron app
        run: npx electron-builder --win --publish never

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: build/*.exe
          body: |
            > 请下载下方的 .exe 安装包进行安装

            ### 安装方式
            1. 下载 `.exe` 安装包
            2. 双击安装
            3. 打开并登录微信电脑版
            4. 启动「壹准AI微信营销助手」
