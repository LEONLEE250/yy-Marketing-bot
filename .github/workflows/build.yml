name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.1.1)'
        required: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Build backend with PyInstaller (spec)
        run: |
          pyinstaller backend/backend.spec --noconfirm

      - name: Install Node dependencies
        run: npm install

      - name: Build Electron app
        run: npx electron-builder --win --publish never

      - name: Generate Release Notes
        id: notes
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          echo "## ${VERSION} 更新内容" > release_notes.md
          echo "" >> release_notes.md
          echo "> 请下载下方的 .exe 安装包进行安装" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 安装方式" >> release_notes.md
          echo "1. 下载 \`.exe\` 安装包" >> release_notes.md
          echo "2. 双击安装" >> release_notes.md
          echo "3. 打开并登录微信电脑版" >> release_notes.md
          echo "4. 启动「壹准AI微信营销助手」" >> release_notes.md
          cat release_notes.md

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.exe
          body_path: release_notes.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
