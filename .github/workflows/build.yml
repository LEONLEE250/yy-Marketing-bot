name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.1)'
        required: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Prepare wechat-wxauto for packaging
        run: |
          # 从仓库上级目录的 wechat-wxauto 复制到项目内
          if (Test-Path ../wechat-wxauto) {
            Copy-Item -Recurse ../wechat-wxauto ./wechat-wxauto
          } else {
            Write-Host "wechat-wxauto not found, skipping (will use embedded)"
          }

      - name: Build backend with PyInstaller
        run: |
          pyinstaller --onefile --name backend --distpath backend/dist `
            --add-data "wechat-wxauto\*.py;wechat-wxauto" `
            --hidden-import flask --hidden-import flask_cors --hidden-import wxauto `
            --hidden-import PIL --hidden-import requests --hidden-import numpy `
            --hidden-import image_enhancer --hidden-import ai_copywriter --hidden-import wxauto_service `
            --hidden-import PIL.Image --hidden-import PIL.ImageDraw --hidden-import PIL.ImageFont `
            --hidden-import PIL.ImageFilter --hidden-import PIL.ImageEnhance `
            backend/app.py

      - name: Install Node dependencies
        run: npm install

      - name: Build Electron app
        run: npx electron-builder --win --publish never

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.exe
          body: |
            ## v1.0.2 更新内容

            - 软件名改为「壹准AI微信营销助手」
            - 群发中心：wxauto 单例优化，不再频繁干扰微信；手动输入收件人兜底
            - 图片工具：修复美化参数传递，亮度/对比度/饱和度可正常调节
            - 设置页：修复 API Key 被意外清空的问题；移除水印预设；改为手动保存
            - 自动更新：支持应用内下载安装包并提示安装

            ### 使用方式
            1. 下载 `.exe` 安装包
            2. 双击安装
            3. 打开微信电脑版
            4. 启动「壹准AI微信营销助手」
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
